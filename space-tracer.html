<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<title>Gyro Space Trail</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}

#overlay{
    position:absolute;
    top:12px;
    left:12px;
    color:white;
    font-family:monospace;
    font-size:14px;
    line-height:1.4;
    background:rgba(0,0,0,.45);
    padding:10px;
    border-radius:8px;
    user-select:none;
}

button{
    margin-top:8px;
    padding:8px 12px;
    font-size:14px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="overlay">
    <div><b>Gyro Space Prototype</b></div>
    <div id="status">Waiting...</div>
    <button id="gyroButton">Enable Gyroscope</button>
    <div style="margin-top:8px;">Tap anywhere to pause/resume.</div>
</div>

<script>
// ===================================================
//                 GLOBAL VARIABLES
// ===================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const gyroButton = document.getElementById("gyroButton");

let width = 0;
let height = 0;
let centerX = 0;
let centerY = 0;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    centerX = width/2;
    centerY = height/2;
}

window.addEventListener("resize",resize);
resize();

// ===================================================
//                     GAME STATE
// ===================================================
let paused = false;
let lastFrame = performance.now();
let fps = 0;

// Assign a random vibrant color on spawn
const myColor = `hsl(${Math.floor(Math.random() * 360)}, 100%, 60%)`;

// ===================================================
//                     SHIP
// ===================================================
const ship = {
    x: 0,
    y: 0,
    angle: 0,
    speed: 3,
    size: 18,
    color: myColor
};

// ===================================================
//               CAMERA / WORLD POSITION
// ===================================================
const camera = {
    x: 0,
    y: 0
};

// ===================================================
//                    PROJECTILES
// ===================================================
const bullets = [];

function fireLaser(x, y, angle, color) {
    bullets.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * 12,
        vy: Math.sin(angle) * 12,
        life: 60,
        color: color
    });
}

// ===================================================
//                    GYROSCOPE
// ===================================================
let gyroSupported = false;
let gyroEnabled = false;
let beta = 0;
let gamma = 0;

// ===================================================
//                     INPUT
// ===================================================
const mouse = {
    x: centerX,
    y: centerY
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// ===================================================
//                  STARFIELD
// ===================================================
const STAR_COUNT = 2500;
const stars = [];

// ===================================================
//                    TRAIL
// ===================================================
const trail = [];

// ===================================================
//                 MULTIPLAYER STATE
// ===================================================
const socket = new WebSocket("wss://my-games-faxi.onrender.com");
const remotePlayers = {}; 

let lastSendTime = 0;
const SEND_INTERVAL = 1000 / 20; // 20 updates per sec

// Helper to derive a deterministic color if server doesn't broadcast custom colors
function getColorFromId(id) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
    return `hsl(${Math.abs(hash) % 360}, 100%, 60%)`;
}

socket.onmessage = event => {
    try {
        const data = JSON.parse(event.data);

        if (data.type === "welcome") {
            console.log("Connected! My ID is:", data.id);
        } else if (data.type === "leave") {
            delete remotePlayers[data.id];
        } else if (data.type === "join") {
            if (data.player) {
                updateRemotePlayer(data.player.id, data.player.x, data.player.y, data.player.angle, data.player.color);
            }
        } else if (data.type === "players") {
            // Initial list of players already connected
            if (Array.isArray(data.players)) {
                data.players.forEach(p => updateRemotePlayer(p.id, p.x, p.y, p.angle, p.color));
            }
        } else if (data.type === "update" && data.player) {
            updateRemotePlayer(data.player.id, data.player.x, data.player.y, data.player.angle, data.player.color, data.player.shot);
        }
    } catch(e) {
        console.error("Error parsing server message", e);
    }
};

function updateRemotePlayer(id, x, y, angle, color, shot) {
    let p = remotePlayers[id];
    const playerColor = color || getColorFromId(id);

    if (!p) {
        remotePlayers[id] = { 
            x: x, 
            y: y, 
            targetX: x, 
            targetY: y, 
            angle: angle, 
            color: playerColor,
            trail: [] 
        };
    } else {
        p.targetX = x;
        p.targetY = y;
        p.angle = angle;
        p.color = playerColor;
        
        // Add to trail
        p.trail.push({ x: x, y: y });
        if (p.trail.length > 500) p.trail.shift();
    }

    // Trigger laser if player fired a shot
    if (shot) {
        fireLaser(shot.x, shot.y, shot.angle, playerColor);
    }
}

// ===================================================
//                   HELPERS
// ===================================================
function lerp(a,b,t){
    return a+(b-a)*t;
}

function wrapAngle(a){
    while(a>Math.PI) a-=Math.PI*2;
    while(a<-Math.PI) a+=Math.PI*2;
    return a;
}

// ===================================================
//              DRAW SHIP (WHITE CONE)
// ===================================================
function drawShip(){
    ctx.save();
    ctx.translate(centerX,centerY);
    ctx.rotate(ship.angle);
    ctx.strokeStyle = ship.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ship.size,0);
    ctx.lineTo(-ship.size*.8,-ship.size*.6);
    ctx.lineTo(-ship.size*.35,0);
    ctx.lineTo(-ship.size*.8,ship.size*.6);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
}

// ===================================================
//              DRAW DEBUG INFORMATION
// ===================================================
function updateOverlay(){
    statusText.innerHTML=
`FPS: ${fps.toFixed(0)}<br>
Paused: ${paused}<br>
Gyro Supported: ${gyroSupported}<br>
Gyro Enabled: ${gyroEnabled}<br>
Beta: ${beta.toFixed(1)}<br>
Gamma: ${gamma.toFixed(1)}<br>
Trail Points: ${trail.length}<br>
Players Online: ${Object.keys(remotePlayers).length + 1}`;
}

// ===================================================
//           GYROSCOPE PERMISSION & EVENTS
// ===================================================
async function enableGyroscope(){
    if(gyroEnabled) return;

    try{
        if(
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        ){
            const result = await DeviceOrientationEvent.requestPermission();
            if(result !== "granted"){
                alert("Gyroscope permission was denied.");
                return;
            }
        }

        window.addEventListener("deviceorientation", onOrientation, true);
        gyroSupported = true;
        gyroEnabled = true;
        gyroButton.style.display = "none";
    }catch(err){
        console.error(err);
        alert("Unable to access gyroscope.");
    }
}

gyroButton.addEventListener("click", enableGyroscope);

function onOrientation(event){
    beta = event.beta || 0;
    gamma = event.gamma || 0;
}

// Queue laser shot to transmit on next update tick
let pendingShot = null;

// ===================================================
//            CLICK / TAP TO FIRE BLASTER
// ===================================================
canvas.addEventListener("click", (e) => {
    if (e.target !== canvas) return;

    // Fire local shot immediately
    fireLaser(ship.x, ship.y, ship.angle, ship.color);

    // Queue for network update
    pendingShot = {
        x: Number(ship.x.toFixed(1)),
        y: Number(ship.y.toFixed(1)),
        angle: Number(ship.angle.toFixed(2))
    };
});

// ===================================================
//            GENERATE RANDOM STARFIELD
// ===================================================
for(let i=0;i<STAR_COUNT;i++){
    stars.push({
        x:(Math.random()-0.5)*30000,
        y:(Math.random()-0.5)*30000,
        size:Math.random()*2+0.4
    });
}

// ===================================================
//                  SHIP MOVEMENT
// ===================================================
function updateShip(dt){
    let desiredAngle;

    if(gyroEnabled){
        desiredAngle = Math.atan2(gamma, -beta);
    }else{
        desiredAngle = Math.atan2(mouse.y-centerY, mouse.x-centerX);
    }

    let difference = wrapAngle(desiredAngle-ship.angle);
    ship.angle += difference*0.06;

    if(!paused){
        ship.x += Math.cos(ship.angle) * ship.speed;
        ship.y += Math.sin(ship.angle) * ship.speed;
    }

    camera.x = ship.x;
    camera.y = ship.y;
}

// ===================================================
//                  UPDATE TRAIL
// ===================================================
let trailAccumulator = 0;

function updateTrail(dt){
    if(paused) return;

    trailAccumulator += dt;
    if(trailAccumulator < 0.03) return;
    trailAccumulator = 0;

    trail.push({
        x:ship.x,
        y:ship.y
    });
}

// ===================================================
//                  DRAW TRAIL
// ===================================================
function drawTrail(){
    if(trail.length < 2) return;

    ctx.strokeStyle = ship.color;
    ctx.lineWidth = 2;
    ctx.beginPath();

    for(let i=0;i<trail.length;i++){
        const p = trail[i];
        const sx = centerX + (p.x-camera.x);
        const sy = centerY + (p.y-camera.y);

        if(i===0) ctx.moveTo(sx,sy);
        else ctx.lineTo(sx,sy);
    }
    ctx.stroke();
}

// ===================================================
//               PROJECTILE LOGIC
// ===================================================
function updateAndDrawBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        if (b.life <= 0) {
            bullets.splice(i, 1);
            continue;
        }

        const sx = centerX + (b.x - camera.x);
        const sy = centerY + (b.y - camera.y);

        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ===================================================
//                  DRAW STARFIELD
// ===================================================
function drawStars(){
    ctx.fillStyle="white";

    for(const star of stars){
        const sx = centerX + (star.x-camera.x*0.05);
        const sy = centerY + (star.y-camera.y*0.05);

        if(sx<0 || sy<0 || sx>width || sy>height) continue;

        ctx.beginPath();
        ctx.arc(sx, sy, star.size, 0, Math.PI*2);
        ctx.fill();
    }
}

// ===================================================
//            DRAW OTHER MULTIPLAYER SHIPS & TRAILS
// ===================================================
function drawRemotePlayers(){
    for (const id in remotePlayers) {
        const p = remotePlayers[id];

        // Smoothly lerp position
        if (p.targetX !== undefined) {
            p.x = lerp(p.x, p.targetX, 0.2);
            p.y = lerp(p.y, p.targetY, 0.2);
        }

        // Draw remote trail
        if (p.trail && p.trail.length > 1) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < p.trail.length; i++) {
                const pt = p.trail[i];
                const tsx = centerX + (pt.x - camera.x);
                const tsy = centerY + (pt.y - camera.y);
                if (i === 0) ctx.moveTo(tsx, tsy);
                else ctx.lineTo(tsx, tsy);
            }
            ctx.stroke();
        }
        
        // Draw remote ship
        const sx = centerX + (p.x - camera.x);
        const sy = centerY + (p.y - camera.y);
        
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(p.angle);
        
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ship.size, 0);
        ctx.lineTo(-ship.size*.8, -ship.size*.6);
        ctx.lineTo(-ship.size*.35, 0);
        ctx.lineTo(-ship.size*.8, ship.size*.6);
        ctx.closePath();
        ctx.stroke();
        
        ctx.restore();
    }
}

// ===================================================
//               DRAW ENTIRE SCENE
// ===================================================
function drawScene(){
    ctx.fillStyle="black";
    ctx.fillRect(0, 0, width, height);

    drawStars();
    drawTrail();
    drawRemotePlayers();
    drawShip();
    updateAndDrawBullets();
}

// ===================================================
//               AUTO DETECT GYRO
// ===================================================
if ("DeviceOrientationEvent" in window) {
    gyroSupported = true;
}

// ===================================================
//             OPTIONAL KEYBOARD TESTING
// ===================================================
window.addEventListener("keydown", e => {
    if (e.code === "Space") {
        paused = !paused;
    }
});

// ===================================================
//               MAIN ANIMATION LOOP
// ===================================================
function animate(now){
    requestAnimationFrame(animate);

    const dt = Math.min((now - lastFrame) / 1000, 0.05);
    lastFrame = now;

    fps = lerp(fps, 1 / Math.max(dt, 0.0001), 0.08);

    updateShip(dt);
    updateTrail(dt);

    // Send valid JSON update payload to server (~20 per sec)
    if (now - lastSendTime >= SEND_INTERVAL) {
        if (socket.readyState === WebSocket.OPEN) {
            const payload = {
                type: "update",
                x: Number(ship.x.toFixed(1)),
                y: Number(ship.y.toFixed(1)),
                angle: Number(ship.angle.toFixed(2)),
                color: ship.color
            };

            if (pendingShot) {
                payload.shot = pendingShot;
                pendingShot = null;
            }

            socket.send(JSON.stringify(payload));
        }
        lastSendTime = now;
    }

    drawScene();
    updateOverlay();
}

requestAnimationFrame(animate);

// ===================================================
//            INITIAL SHIP/TRAIL SETUP
// ===================================================
trail.push({
    x: ship.x,
    y: ship.y
});

// ===================================================
//               PREVENT PAGE SCROLL
// ===================================================
document.body.addEventListener("touchmove", function(e){
    e.preventDefault();
}, { passive:false });

// ===================================================
//             DOUBLE TAP ZOOM DISABLE
// ===================================================
let lastTouch = 0;
document.body.addEventListener("touchend", function(e){
    const now = Date.now();
    if(now-lastTouch<300){
        e.preventDefault();
    }
    lastTouch = now;
}, {passive:false});

// ===================================================
//              INITIAL OVERLAY TEXT
// ===================================================
updateOverlay();
console.log("Gyro Space Prototype Ready");
</script>
    
</body>
</html>
