<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<title>Gyro Space Trail</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    touch-action:none;
    font-family: Arial, sans-serif;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}

#overlay{
    position:absolute;
    top:12px;
    left:12px;
    color:white;
    font-family:monospace;
    font-size:14px;
    line-height:1.4;
    background:rgba(0,0,0,.45);
    padding:10px;
    border-radius:8px;
    user-select:none;
    pointer-events:auto;
}

#overlay.hidden{
    display:none;
}

#guiToggle{
    position:absolute;
    top:12px;
    left:12px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:rgba(100,200,255,0.7);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
    color:white;
    z-index:999;
    border:2px solid rgba(100,200,255,1);
    transition:all 0.2s ease;
}

#guiToggle:hover{
    background:rgba(100,200,255,0.9);
    transform:scale(1.1);
}

#menuOverlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    flex-direction:column;
}

#menuOverlay.hidden{
    display:none;
}

.menu-container{
    text-align:center;
    color:white;
}

.menu-container h1{
    font-size:48px;
    margin:0 0 30px 0;
    text-shadow:0 0 20px rgba(255,100,150,0.8);
}

.menu-container p{
    font-size:18px;
    margin:0 0 40px 0;
    color:#aaa;
}

.button-group{
    display:flex;
    gap:20px;
    justify-content:center;
}

.menu-btn{
    padding:15px 40px;
    font-size:18px;
    border:2px solid #fff;
    background:rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
    border-radius:8px;
    transition:all 0.3s ease;
    text-transform:uppercase;
    font-weight:bold;
    letter-spacing:2px;
}

.menu-btn:hover{
    background:rgba(255,100,150,0.3);
    border-color:#ff6496;
    box-shadow:0 0 15px rgba(255,100,150,0.5);
}

.menu-btn:active{
    transform:scale(0.98);
}

button{
    margin-top:8px;
    padding:8px 12px;
    font-size:14px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="guiToggle">⚙</div>

<div id="menuOverlay">
    <div class="menu-container">
        <h1>GYRO SPACE</h1>
        <p>Select your control scheme</p>
        <div class="button-group">
            <button class="menu-btn" id="mobileBtn">Mobile</button>
            <button class="menu-btn" id="computerBtn">Computer</button>
        </div>
    </div>
</div>

<div id="overlay">
    <div><b>Gyro Space Prototype</b></div>
    <div id="status">Waiting...</div>
    <button id="gyroButton">Enable Gyroscope</button>
    <button id="audioToggleBtn">Audio: ALL ON</button>
    <div style="margin-top:8px;">Click to fire. Hold 3 sec for charged beam.<br>Computer: Hold [SPACE] to charge Dash.</div>
</div>

<script>
// ===================================================
//                 GLOBAL VARIABLES
// ===================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const gyroButton = document.getElementById("gyroButton");
const audioToggleBtn = document.getElementById("audioToggleBtn");
const guiToggleBtn = document.getElementById("guiToggle");
const menuOverlay = document.getElementById("menuOverlay");
const overlay = document.getElementById("overlay");
const mobileBtn = document.getElementById("mobileBtn");
const computerBtn = document.getElementById("computerBtn");

let width = 0;
let height = 0;
let centerX = 0;
let centerY = 0;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    centerX = width/2;
    centerY = height/2;
}

window.addEventListener("resize",resize);
resize();

// ===================================================
//                  GAME STATE
// ===================================================
let paused = false;
let lastFrame = performance.now();
let frameTime = 0;
let fps = 0;
let gameStarted = false;
let controlMode = null; // "mobile" or "computer"
let guiVisible = true;
let audioEnabled = true;

// Assign a random vibrant color on spawn
const myColor = `hsl(${Math.floor(Math.random() * 360)}, 100%, 60%)`;

// ===================================================
//                     SHIP
// ===================================================
const ship = {
    x: 0,
    y: 0,
    angle: 0,
    baseSpeed: 3,
    speed: 3,
    size: 18,
    color: myColor
};

// ===================================================
//               DASH MECHANICS (SPACE)
// ===================================================
let spaceHeld = false;
let spaceHoldStartTime = 0;
let dashChargeDuration = 0; // seconds held (up to 10)
let dashTimeRemaining = 0;   // active dash time remaining (up to 5)
let isDashing = false;

// ===================================================
//               CAMERA / WORLD POSITION
// ===================================================
const camera = {
    x: 0,
    y: 0
};

// ===================================================
//           SPATIAL GRID SYSTEM
// ===================================================
const GRID_SIZE = 500;
const grid = {};

function getGridKey(x, y) {
    const cellX = Math.floor(x / GRID_SIZE);
    const cellY = Math.floor(y / GRID_SIZE);
    return `${cellX},${cellY}`;
}

function getVisibleGridCells() {
    const minCellX = Math.floor(camera.x / GRID_SIZE) - 1;
    const minCellY = Math.floor(camera.y / GRID_SIZE) - 1;
    const maxCellX = Math.floor((camera.x + width) / GRID_SIZE) + 1;
    const maxCellY = Math.floor((camera.y + height) / GRID_SIZE) + 1;
    
    const cells = [];
    for (let x = minCellX; x <= maxCellX; x++) {
        for (let y = minCellY; y <= maxCellY; y++) {
            cells.push(`${x},${y}`);
        }
    }
    return cells;
}

function addToGrid(key, object) {
    if (!grid[key]) {
        grid[key] = [];
    }
    grid[key].push(object);
}

function removeFromGrid(key, object) {
    if (grid[key]) {
        const idx = grid[key].indexOf(object);
        if (idx > -1) {
            grid[key].splice(idx, 1);
        }
    }
}

// ===================================================
//              CHARGED BEAM STATE
// ===================================================
let isChargingBeam = false;
let beamChargeStartTime = 0;
let beamCooldownEnd = 0;

// ===================================================
//                    PROJECTILES
// ===================================================
const bullets = [];
const bulletPool = [];
const MAX_BULLETS = 200;

for (let i = 0; i < MAX_BULLETS; i++) {
    bulletPool.push({
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        life: 0,
        maxLife: 0,
        color: "#fff",
        type: "standard",
        firedAt: { x: 0, y: 0 },
        maxDistance: 500,
        size: 3,
        active: false,
        gridKey: null
    });
}

function fireLaser(x, y, angle, color, shotType = "standard") {
    if (bullets.length >= MAX_BULLETS) {
        return;
    }
    
    const maxDist = shotType === "beam" ? 1500 : 500;
    const maxLife = shotType === "beam" ? 150 : 60;
    
    let bullet;
    if (bulletPool.length > 0) {
        bullet = bulletPool.pop();
    } else {
        bullet = { firedAt: { x: 0, y: 0 }, gridKey: null };
    }
    
    bullet.x = x;
    bullet.y = y;
    bullet.vx = Math.cos(angle) * 12;
    bullet.vy = Math.sin(angle) * 12;
    bullet.life = maxLife;
    bullet.maxLife = maxLife;
    bullet.color = color;
    bullet.type = shotType;
    bullet.firedAt.x = x;
    bullet.firedAt.y = y;
    bullet.maxDistance = maxDist;
    bullet.size = shotType === "beam" ? 5 : 3;
    bullet.active = true;
    bullet.gridKey = getGridKey(x, y);
    
    addToGrid(bullet.gridKey, bullet);
    bullets.push(bullet);
}

// ===================================================
//                    AUDIO SYSTEM
// ===================================================
const sounds = {
    standardShot: [
        new Audio("pit-pit-pit-1.mp3"),
        new Audio("pit-pit-pit-2.mp3"),
        new Audio("pit-pit-pit-3.mp3")
    ],
    chargedBeam: new Audio("thwop.mp3"),
    chargeSound: new Audio("thwop-charge.mp3")
};

sounds.standardShot.forEach(sound => sound.preload = "auto");
sounds.chargedBeam.preload = "auto";
sounds.chargeSound.preload = "auto";

function getRandomStandardShot() {
    const index = Math.floor(Math.random() * sounds.standardShot.length);
    return sounds.standardShot[index];
}

function playLocalSound(shotType) {
    if (!audioEnabled) return;

    let sound = shotType === "standard" ? getRandomStandardShot() : sounds.chargedBeam;
    sound.currentTime = 0;
    sound.volume = 1.0;
    sound.play().catch(e => {});
}

function playRemoteShotSound(remoteX, remoteY, shotType) {
    if (!audioEnabled) return;

    const dist = Math.hypot(remoteX - ship.x, remoteY - ship.y);
    const maxHearRange = 5000;
    
    if (dist > maxHearRange) return;
    
    let sound = shotType === "standard" ? getRandomStandardShot() : sounds.chargedBeam;
    const volume = Math.max(0.1, 1 - (dist / maxHearRange));
    sound.volume = volume;
    
    sound.currentTime = 0;
    sound.play().catch(e => {});
}

function startBeamChargeAudio() {
    if (!audioEnabled) return;
    sounds.chargeSound.currentTime = 0;
    sounds.chargeSound.volume = 1.0;
    sounds.chargeSound.play().catch(e => {});
}

function updateBeamChargeAudio() {
    if (!audioEnabled || !isChargingBeam) return;
    
    // Cycle last 0.5s of charge sound effect if held beyond sound duration
    if (sounds.chargeSound.duration > 0.5) {
        const loopStart = sounds.chargeSound.duration - 0.5;
        if (sounds.chargeSound.currentTime >= sounds.chargeSound.duration - 0.05) {
            sounds.chargeSound.currentTime = loopStart;
        }
    }
}

function stopBeamChargeAudio() {
    sounds.chargeSound.pause();
    sounds.chargeSound.currentTime = 0;
}

// ===================================================
//                    GYROSCOPE
// ===================================================
let gyroSupported = false;
let gyroEnabled = false;
let beta = 0;
let gamma = 0;
let neutralGamma = null;

// ===================================================
//                     INPUT
// ===================================================
const mouse = {
    x: centerX,
    y: centerY
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// ===================================================
//                  STARFIELD (50,000)
// ===================================================
const STAR_COUNT = 50000;
const stars = [];

for(let i=0; i<STAR_COUNT; i++){
    stars.push({
        x: (Math.random()-0.5)*30000,
        y: (Math.random()-0.5)*30000,
        size: Math.random()*2+0.4
    });
}

// ===================================================
//                    TRAIL
// ===================================================
const trail = [];

// ===================================================
//                 MULTIPLAYER STATE
// ===================================================
const socket = new WebSocket("wss://my-games-faxi.onrender.com");
const remotePlayers = {}; 

let lastSendTime = 0;
const SEND_INTERVAL = 1000 / 20;

function getColorFromId(id) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
    return `hsl(${Math.abs(hash) % 360}, 100%, 60%)`;
}

socket.onmessage = event => {
    try {
        const data = JSON.parse(event.data);

        if (data.type === "welcome") {
            console.log("Connected! My ID is:", data.id);
        } else if (data.type === "leave") {
            delete remotePlayers[data.id];
        } else if (data.type === "join") {
            if (data.player) {
                updateRemotePlayer(data.player.id, data.player.x, data.player.y, data.player.angle, data.player.color);
            }
        } else if (data.type === "players") {
            if (Array.isArray(data.players)) {
                data.players.forEach(p => updateRemotePlayer(p.id, p.x, p.y, p.angle, p.color));
            }
        } else if (data.type === "update" && data.player) {
            updateRemotePlayer(data.player.id, data.player.x, data.player.y, data.player.angle, data.player.color, data.player.shot);
        }
    } catch(e) {
        console.error("Error parsing server message", e);
    }
};

function updateRemotePlayer(id, x, y, angle, color, shot) {
    let p = remotePlayers[id];
    const playerColor = color || getColorFromId(id);

    if (!p) {
        remotePlayers[id] = { 
            x: x, 
            y: y, 
            targetX: x, 
            targetY: y, 
            angle: angle, 
            color: playerColor,
            trail: [] 
        };
    } else {
        p.targetX = x;
        p.targetY = y;
        p.angle = angle;
        p.color = playerColor;
        
        p.trail.push({ x: x, y: y });
        if (p.trail.length > 500) p.trail.shift();
    }

    if (shot) {
        fireLaser(shot.x, shot.y, shot.angle, playerColor, shot.type || "standard");
        playRemoteShotSound(shot.x, shot.y, shot.type || "standard");
    }
}

// ===================================================
//                   HELPERS
// ===================================================
function lerp(a,b,t){
    return a+(b-a)*t;
}

function wrapAngle(a){
    while(a>Math.PI) a-=Math.PI*2;
    while(a<-Math.PI) a+=Math.PI*2;
    return a;
}

// ===================================================
//              DRAW SHIP (SOLID)
// ===================================================
function drawShip(){
    ctx.save();
    ctx.translate(centerX,centerY);
    ctx.rotate(ship.angle);
    ctx.fillStyle = ship.color;
    ctx.beginPath();
    ctx.moveTo(ship.size,0);
    ctx.lineTo(-ship.size*.8,-ship.size*.6);
    ctx.lineTo(-ship.size*.35,0);
    ctx.lineTo(-ship.size*.8,ship.size*.6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

// ===================================================
//   DRAW CHARGE-UP & BEAM COOLDOWN RINGS
// ===================================================
function drawCooldownRing() {
    const now = Date.now();
    
    // 1. Draw Charge-Up Animation (Reverse cooldown)
    if (isChargingBeam) {
        const chargeTime = Math.min(3000, now - beamChargeStartTime);
        const chargeProgress = chargeTime / 3000;
        
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.strokeStyle = `rgba(100, 220, 255, ${0.4 + chargeProgress * 0.6})`;
        ctx.lineWidth = 3 + chargeProgress * 2;
        ctx.beginPath();
        // Reverse closing arc towards top
        const startAngle = -Math.PI / 2 - Math.PI * (1 - chargeProgress);
        const endAngle = -Math.PI / 2 + Math.PI * (1 - chargeProgress);
        ctx.arc(0, 0, 40 - chargeProgress * 10, startAngle, endAngle);
        ctx.stroke();
        ctx.restore();
    }

    // 2. Cooldown Ring After Beam Shot
    if (now < beamCooldownEnd) {
        const remainingMs = beamCooldownEnd - now;
        const progress = 1 - (remainingMs / 5000);
        
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.strokeStyle = "rgba(255, 100, 100, 0.6)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, 35, -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * progress));
        ctx.stroke();
        ctx.restore();
    }
}

// ===================================================
//              DRAW DEBUG INFORMATION
// ===================================================
function updateOverlay(){
    const now = Date.now();
    const beamCooldownRemaining = Math.max(0, Math.ceil((beamCooldownEnd - now) / 1000));
    
    let gyroInfo = "";
    if (gyroEnabled) {
        gyroInfo = `<br>Beta: ${beta.toFixed(1)}°<br>Gamma: ${gamma.toFixed(1)}°<br>Neutral: ${neutralGamma?.toFixed(1) || "?"}°`;
    }

    let dashInfo = "";
    if (controlMode === "computer") {
        if (isDashing) {
            dashInfo = `<br>Dash ACTIVE: ${dashTimeRemaining.toFixed(1)}s (3x Speed)`;
        } else if (spaceHeld) {
            dashInfo = `<br>Dash Charging: ${dashChargeDuration.toFixed(1)}s (-40% Speed Penalty)`;
        } else {
            dashInfo = `<br>Dash Ready (Hold SPACE)`;
        }
    }
    
    statusText.innerHTML =
`FPS: ${fps.toFixed(0)} | ${frameTime.toFixed(1)}ms<br>
Pos: X: ${Math.round(ship.x)} | Y: ${Math.round(ship.y)}<br>
Mode: ${controlMode}${dashInfo}<br>
Gyro Enabled: ${gyroEnabled}${gyroInfo}<br>
Bullets: ${bullets.length}/${MAX_BULLETS}<br>
Pool: ${bulletPool.length}<br>
Grid Cells: ${Object.keys(grid).length}<br>
Beam Cooldown: ${beamCooldownRemaining}s<br>
Players Online: ${Object.keys(remotePlayers).length + 1}`;
}

// ===================================================
//           GYROSCOPE PERMISSION & EVENTS
// ===================================================
async function enableGyroscope(){
    if(gyroEnabled) return true;

    try{
        if(
            typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function"
        ){
            const result = await DeviceOrientationEvent.requestPermission();
            if(result !== "granted") return false;
        }

        window.addEventListener("deviceorientation", onOrientation, true);
        gyroSupported = true;
        gyroEnabled = true;
        gyroButton.style.display = "none";
        return true;
    }catch(err){
        console.error("Gyroscope error:", err);
        return false;
    }
}

gyroButton.addEventListener("click", enableGyroscope);

function onOrientation(event){
    beta = event.beta || 0;
    gamma = event.gamma || 0;
    
    if (neutralGamma === null && Math.abs(gamma) < 90) {
        neutralGamma = gamma;
    }
}

let pendingShot = null;

// ===================================================
//       MOUSE DOWN/UP FOR CHARGED BEAM
// ===================================================
canvas.addEventListener("mousedown", (e) => {
    if (e.target !== canvas || !gameStarted) return;
    isChargingBeam = true;
    beamChargeStartTime = Date.now();
    startBeamChargeAudio();
});

canvas.addEventListener("mouseup", (e) => {
    if (e.target !== canvas || !gameStarted) return;

    const holdTime = Date.now() - beamChargeStartTime;
    isChargingBeam = false;
    stopBeamChargeAudio();

    const shotType = holdTime >= 3000 ? "beam" : "standard";
    
    if (shotType === "beam" && Date.now() < beamCooldownEnd) {
        return;
    }

    fireLaser(ship.x, ship.y, ship.angle, ship.color, shotType);
    playLocalSound(shotType);

    pendingShot = {
        x: Number(ship.x.toFixed(1)),
        y: Number(ship.y.toFixed(1)),
        angle: Number(ship.angle.toFixed(2)),
        type: shotType
    };

    if (shotType === "beam") {
        beamCooldownEnd = Date.now() + 5000;
    }
});

// ===================================================
//      TOUCH SUPPORT FOR CHARGED BEAM
// ===================================================
canvas.addEventListener("touchstart", (e) => {
    if (e.target !== canvas || !gameStarted) return;
    isChargingBeam = true;
    beamChargeStartTime = Date.now();
    startBeamChargeAudio();
    e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
    if (e.target !== canvas || !gameStarted) return;

    const holdTime = Date.now() - beamChargeStartTime;
    isChargingBeam = false;
    stopBeamChargeAudio();

    const shotType = holdTime >= 3000 ? "beam" : "standard";
    
    if (shotType === "beam" && Date.now() < beamCooldownEnd) {
        return;
    }

    fireLaser(ship.x, ship.y, ship.angle, ship.color, shotType);
    playLocalSound(shotType);

    pendingShot = {
        x: Number(ship.x.toFixed(1)),
        y: Number(ship.y.toFixed(1)),
        angle: Number(ship.angle.toFixed(2)),
        type: shotType
    };

    if (shotType === "beam") {
        beamCooldownEnd = Date.now() + 5000;
    }

    e.preventDefault();
}, { passive: false });

// ===================================================
//            MENU BUTTON HANDLERS
// ===================================================
mobileBtn.addEventListener("click", async () => {
    controlMode = "mobile";
    gameStarted = true;
    menuOverlay.classList.add("hidden");
    
    if (gyroSupported) {
        await enableGyroscope();
        if (!gyroEnabled) {
            gyroButton.style.display = "block";
        }
    } else {
        gyroButton.style.display = "none";
    }
});

computerBtn.addEventListener("click", () => {
    controlMode = "computer";
    gameStarted = true;
    menuOverlay.classList.add("hidden");
    gyroButton.style.display = "none";
});

// ===================================================
//            AUDIO TOGGLE HANDLER
// ===================================================
audioToggleBtn.addEventListener("click", () => {
    audioEnabled = !audioEnabled;
    if (audioEnabled) {
        bgMusic.play().catch(() => {});
        audioToggleBtn.textContent = "Audio: ALL ON";
    } else {
        bgMusic.pause();
        stopBeamChargeAudio();
        audioToggleBtn.textContent = "Audio: ALL OFF";
    }
});

// ===================================================
//            GUI TOGGLE HANDLER
// ===================================================
guiToggleBtn.addEventListener("click", () => {
    guiVisible = !guiVisible;
    if (guiVisible) {
        overlay.classList.remove("hidden");
        guiToggleBtn.style.opacity = "1";
    } else {
        overlay.classList.add("hidden");
        guiToggleBtn.style.opacity = "0.3";
    }
});

// ===================================================
//                  SHIP MOVEMENT
// ===================================================
function updateShip(dt){
    let desiredAngle;

    if(controlMode === "mobile" && gyroEnabled){
        if (neutralGamma !== null) {
            const gammaDelta = gamma - neutralGamma;
            const turnStrength = 0.08;
            ship.angle += (gammaDelta * Math.PI / 180) * turnStrength;
        }
    }else if(controlMode === "computer"){
        desiredAngle = Math.atan2(mouse.y-centerY, mouse.x-centerX);
        let difference = wrapAngle(desiredAngle-ship.angle);
        ship.angle += difference*0.06;

        // Computer Dash charging & 40% speed reduction penalty
        if (spaceHeld && !isDashing) {
            dashChargeDuration = Math.min(10, (performance.now() - spaceHoldStartTime) / 1000);
            ship.speed = ship.baseSpeed * 0.6; // Reduced 40% while charging
        } else if (!isDashing) {
            ship.speed = ship.baseSpeed;
        }

        if (isDashing) {
            dashTimeRemaining -= dt;
            if (dashTimeRemaining <= 0) {
                dashTimeRemaining = 0;
                isDashing = false;
                ship.speed = ship.baseSpeed;
            }
        }
    }

    if(!paused){
        ship.x += Math.cos(ship.angle) * ship.speed;
        ship.y += Math.sin(ship.angle) * ship.speed;
    }

    camera.x = ship.x;
    camera.y = ship.y;
}

// ===================================================
//                  UPDATE TRAIL
// ===================================================
let trailAccumulator = 0;

function updateTrail(dt){
    if(paused) return;

    trailAccumulator += dt;
    if(trailAccumulator < 0.03) return;
    trailAccumulator = 0;

    trail.push({
        x: ship.x,
        y: ship.y
    });

    if (trail.length > 1000) {
        trail.shift();
    }
}

// ===================================================
//                  DRAW TRAIL
// ===================================================
function drawTrail(){
    if(trail.length < 2) return;

    ctx.strokeStyle = ship.color;
    ctx.lineWidth = 2;
    ctx.beginPath();

    for(let i=0;i<trail.length;i++){
        const p = trail[i];
        const sx = centerX + (p.x-camera.x);
        const sy = centerY + (p.y-camera.y);

        if(i===0) ctx.moveTo(sx,sy);
        else ctx.lineTo(sx,sy);
    }
    ctx.stroke();
}

// ===================================================
//            BATCH RENDER BULLETS BY TYPE
// ===================================================
function updateAndDrawBullets() {
    const visibleCells = getVisibleGridCells();
    
    for (const cellKey of visibleCells) {
        if (grid[cellKey]) {
            // Cell active
        }
    }

    const standardBullets = [];
    const beamBullets = [];

    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        if (b.life <= 0) {
            removeFromGrid(b.gridKey, b);
            bulletPool.push(b);
            bullets.splice(i, 1);
            continue;
        }

        const newGridKey = getGridKey(b.x, b.y);
        if (newGridKey !== b.gridKey) {
            removeFromGrid(b.gridKey, b);
            b.gridKey = newGridKey;
            addToGrid(newGridKey, b);
        }

        if (b.type === "beam") {
            beamBullets.push(b);
        } else {
            standardBullets.push(b);
        }
    }

    if (standardBullets.length > 0) {
        renderBulletBatch(standardBullets, false);
    }

    if (beamBullets.length > 0) {
        renderBulletBatch(beamBullets, true);
    }
}

function renderBulletBatch(bulletArray, isBeam) {
    const byColor = {};
    
    for (const b of bulletArray) {
        if (!byColor[b.color]) {
            byColor[b.color] = [];
        }
        byColor[b.color].push(b);
    }

    for (const color in byColor) {
        const bullets = byColor[color];
        ctx.fillStyle = color;

        for (const b of bullets) {
            const distTraveled = Math.hypot(b.x - b.firedAt.x, b.y - b.firedAt.y);
            
            let opacity = 1.0;
            if (distTraveled > b.maxDistance) {
                opacity = Math.max(0, 1 - (distTraveled - b.maxDistance) / 100);
            }

            const sx = centerX + (b.x - camera.x);
            const sy = centerY + (b.y - camera.y);

            if (sx < -50 || sx > width + 50 || sy < -50 || sy > height + 50) {
                continue;
            }

            ctx.globalAlpha = opacity;
            ctx.beginPath();
            ctx.arc(sx, sy, b.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.globalAlpha = 1.0;
}
    
// ===================================================
//             AUTOMATIC BACKGROUND MUSIC
// ===================================================
const bgMusic = new Audio("Gyro Music.mp3");
bgMusic.volume = 0.3;
bgMusic.loop = true;

function startAudio() {
    if (!audioEnabled) return;
    bgMusic.play().then(() => {
        window.removeEventListener("click", startAudio);
        window.removeEventListener("touchstart", startAudio);
    }).catch(() => {});
}

window.addEventListener("click", startAudio);
window.addEventListener("touchstart", startAudio);
    
// ===================================================
//                  DRAW STARFIELD
// ===================================================
function drawStars(){
    ctx.fillStyle="white";

    for(let i=0; i<STAR_COUNT; i++){
        const star = stars[i];
        const sx = centerX + (star.x - camera.x*0.05);
        const sy = centerY + (star.y - camera.y*0.05);

        if(sx<0 || sy<0 || sx>width || sy>height) continue;

        ctx.beginPath();
        ctx.arc(sx, sy, star.size, 0, Math.PI*2);
        ctx.fill();
    }
}

// ===================================================
//            DRAW OTHER MULTIPLAYER SHIPS & TRAILS
// ===================================================
function drawRemotePlayers(){
    for (const id in remotePlayers) {
        const p = remotePlayers[id];

        if (p.targetX !== undefined) {
            p.x = lerp(p.x, p.targetX, 0.2);
            p.y = lerp(p.y, p.targetY, 0.2);
        }

        if (p.trail && p.trail.length > 1) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < p.trail.length; i++) {
                const pt = p.trail[i];
                const tsx = centerX + (pt.x - camera.x);
                const tsy = centerY + (pt.y - camera.y);
                
                if (i === 0) ctx.moveTo(tsx, tsy);
                else ctx.lineTo(tsx, tsy);
            }
            ctx.stroke();
        }
        
        const sx = centerX + (p.x - camera.x);
        const sy = centerY + (p.y - camera.y);
        
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(p.angle);
        
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.moveTo(ship.size, 0);
        ctx.lineTo(-ship.size*.8, -ship.size*.6);
        ctx.lineTo(-ship.size*.35, 0);
        ctx.lineTo(-ship.size*.8, ship.size*.6);
        ctx.closePath();
        ctx.fill();
        
        ctx.restore();
    }
}

// ===================================================
//               DRAW ENTIRE SCENE
// ===================================================
function drawScene(){
    ctx.fillStyle="black";
    ctx.fillRect(0, 0, width, height);

    drawStars();
    drawTrail();
    drawRemotePlayers();
    drawCooldownRing();
    drawShip();
    updateAndDrawBullets();
}

// ===================================================
//               AUTO DETECT GYRO
// ===================================================
if ("DeviceOrientationEvent" in window) {
    gyroSupported = true;
}

// ===================================================
//          KEYBOARD CONTROL FOR COMPUTER DASH
// ===================================================
window.addEventListener("keydown", e => {
    if (e.code === "Space" && controlMode === "computer" && !spaceHeld && !e.repeat) {
        spaceHeld = true;
        spaceHoldStartTime = performance.now();
    }
});

window.addEventListener("keyup", e => {
    if (e.code === "Space" && controlMode === "computer" && spaceHeld) {
        spaceHeld = false;
        const holdDurationSec = Math.min(10, (performance.now() - spaceHoldStartTime) / 1000);
        if (holdDurationSec > 0.1) {
            dashTimeRemaining = (holdDurationSec / 10) * 5;
            isDashing = true;
            ship.speed = ship.baseSpeed * 3;
        } else {
            ship.speed = ship.baseSpeed;
        }
        dashChargeDuration = 0;
    }
});

// ===================================================
//               MAIN ANIMATION LOOP
// ===================================================
function animate(now){
    requestAnimationFrame(animate);

    const frameStartTime = performance.now();

    const dt = Math.min((now - lastFrame) / 1000, 0.05);
    lastFrame = now;

    fps = lerp(fps, 1 / Math.max(dt, 0.0001), 0.08);

    if(gameStarted){
        updateShip(dt);
        updateTrail(dt);
        updateBeamChargeAudio();

        if (now - lastSendTime >= SEND_INTERVAL) {
            if (socket.readyState === WebSocket.OPEN) {
                const payload = {
                    type: "update",
                    x: Number(ship.x.toFixed(1)),
                    y: Number(ship.y.toFixed(1)),
                    angle: Number(ship.angle.toFixed(2)),
                    color: ship.color
                };

                if (pendingShot) {
                    payload.shot = pendingShot;
                    pendingShot = null;
                }

                socket.send(JSON.stringify(payload));
            }
            lastSendTime = now;
        }
    }

    drawScene();
    
    frameTime = performance.now() - frameStartTime;
    updateOverlay();
}

requestAnimationFrame(animate);

trail.push({
    x: ship.x,
    y: ship.y
});

}, { passive:false });

document.body.addEventListener("touchend", function(e){
    const now = Date.now();
    if(now-lastTouch<300){
        e.preventDefault();
    }
    lastTouch = now;
}, {passive:false});

updateOverlay();
